name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci-linux:
    name: ci-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/portwatch

  ci-macos:
    name: ci-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/portwatch
